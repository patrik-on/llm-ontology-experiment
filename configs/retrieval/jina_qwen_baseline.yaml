collections:
  refactor: refactor
  tests: tests
  mixed: mixed
  refactoring_examples: refactoring_examples
  test_examples: test_examples
  software_engineering_literature: software_engineering_literature
  ontology_concepts: ontology_concepts
  project_context: project_context

embeddings:
  provider: sentence_transformers
  model: jinaai/jina-embeddings-v2-base-code
  revision: 516f4baf13dec4ddddda8631e019b5737c8bc250
  remote_code_revision: 3baf9e3ac750e76e8edd3019170176884695fb94
  version: 516f4baf13dec4ddddda8631e019b5737c8bc250
  dimension: 768
  normalized: true
  device: cpu
  batch_size: 16
  max_sequence_length: 8192
  trust_remote_code: true
  deterministic: true
  candidate_status: primary_baseline_candidate

llm:
  provider: ollama
  model: qwen2.5-coder:7b
  version: runtime_digest
  mock_response: '{}'
  base_url: http://localhost:11434
  temperature: 0.0
  top_p: 0.9
  max_tokens: 2048
  seed: 42
  timeout_seconds: 120

vector_store:
  provider: chromadb
  persist_path: data/chroma/jina_qwen_baseline
  distance: cosine

ingestion:
  allowed_splits:
    - train
  pipeline_version: rag-v2
  literature_max_chars: 1800

retrieval:
  mode: single_collection_rag
  top_k: 5
  max_context_tokens: 12000
  allowed_splits:
    - train
  collections:
    - tests
  metadata_filter: {}

experiment:
  results_path: experiments/results/jina_qwen_baseline.jsonl
  random_seed: 42
